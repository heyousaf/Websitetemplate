<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Page</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:wght@600;700&family=DM+Serif+Display&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"></head>
<body data-page="custom">
<main id="page"></main>
<script src="assets/js/data.js"></script>
<script>
  // Reads ?slug=foo and sets body data-slug before site.js runs
  const slug = new URLSearchParams(location.search).get("slug") || "";
  document.body.dataset.slug = slug;
  const data = JSON.parse(localStorage.getItem("site_data_v1") || "{}");
  const meta = (data.customPages||[]).find(p=>p.slug===slug);
  if (meta) { document.title = meta.title; document.body.dataset.pageTitle = meta.title; }
</script>
<script src="assets/js/site.js"></script>
</body></html>
